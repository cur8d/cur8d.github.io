name: Feature Request
description: Suggest an idea for a new feature or an improvement to an existing one
body:
  - type: input
    id: title
    attributes:
      label: Title
      placeholder: "[FEAT] Brief description of the feature"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Is your feature request related to a problem? Please describe.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Add any other context or screenshots about the feature request here.
