name: Bug Report
description: File a bug report
body:
  - type: input
    id: title
    attributes:
      label: Title
      placeholder: "[BUG] Brief description of the issue"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Browser, Node version, etc.
      placeholder: |
        OS: macOS 14.0
        Browser: Chrome 120
        Node version: 24.0.0
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      placeholder: |
        1. Run `pnpm dev`
        2. Navigate to `/dashboard`
        3. Click on ...
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs Actual
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Add any other context or screenshots about the problem here.
